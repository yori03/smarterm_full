<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — SmartERM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #6c63e8;
      --purple-dark: #4a3fc0;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --danger: #dc2626;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(148deg, #9d9af5 0%, #7b78f2 28%, #a7a2ed 60%, #a0a8f8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 6rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative circles */
    body::before {
      content: "";
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -130px; right: -110px;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: 80px; left: -70px;
      pointer-events: none;
    }

    /* dot grid */
    .dot-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.15) 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none; z-index: 0;
    }

    /* ── Brand ── */
    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 2rem;
      position: relative; z-index: 1;
    }
    .brand-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: rgba(255,255,255,0.20);
      border: 1.5px solid rgba(255,255,255,0.40);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .brand-text .top  { font-size: 0.58rem; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.08em; text-transform: uppercase; }
    .brand-text .name { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .brand-text .sub  { font-size: 0.58rem; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Form box ── */
    .form-box {
      width: 100%; max-width: 440px;
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(74,63,192,0.20), 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(255,255,255,0.5);
      position: relative; z-index: 1;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color 0.18s;
    }
    .back-link:hover { color: var(--purple); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .form-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.04em; color: var(--text); margin-bottom: 0.4rem; }
    .form-subtitle { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; line-height: 1.6; margin-bottom: 1.75rem; }

    /* Alert */
    .alert { padding: 0.85rem 1rem; border-radius: 14px; margin-bottom: 1rem; font-size: 0.85rem; font-weight: 600; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .d-none { display: none !important; }

    /* Fields */
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .required { color: var(--danger); }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); display: flex; align-items: center; }
    .input-icon svg { width: 17px; height: 17px; stroke: #9ca3af; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .toggle-pw { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; }
    .toggle-pw svg { width: 18px; height: 18px; stroke: #9ca3af; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.18s; }
    .toggle-pw:hover svg { stroke: #374151; }

    .form-control {
      width: 100%; padding: 0.9rem 1rem 0.9rem 2.9rem;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-family: inherit; font-size: 0.95rem; color: var(--text); background: #fff;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(108,99,232,0.12); }
    .form-control::placeholder { color: #c9d0dc; }
    .form-control.has-toggle { padding-right: 3rem; }

    /* Buttons */
    .btn-submit {
      width: 100%; padding: 1rem 1.25rem; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: #fff; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      box-shadow: 0 4px 18px rgba(74,63,192,0.35);
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    .btn-submit svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .btn-submit:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(74,63,192,0.42); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center; position: relative;
      color: #9ca3af; font-size: 0.78rem; margin: 0 0 1rem;
    }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: calc(50% - 22px); height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .btn-register {
      width: 100%; padding: 0.9rem 1.25rem; border-radius: 14px;
      background: transparent; color: var(--purple);
      border: 1.5px solid #a5b4fc;
      font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      margin-bottom: 1rem;
    }
    .btn-register:hover { background: rgba(108,99,232,0.06); border-color: var(--purple); }

    /* Info note */
    .info-note {
      background: rgba(108,99,232,0.06); border: 1px solid rgba(108,99,232,0.18);
      border-radius: 14px; padding: 1rem 1.1rem;
      display: flex; align-items: flex-start; gap: 0.65rem;
    }
    .info-note svg { width: 16px; height: 16px; stroke: var(--purple-dark); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; margin-top: 0.1rem; }
    .info-note span { font-size: 0.8rem; font-weight: 600; color: var(--purple-dark); line-height: 1.55; }

    /* Spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer bar ── */
    .footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.85rem 2rem;
      display: flex; align-items: center; justify-content: center; gap: 1.25rem;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.30);
      z-index: 10;
    }
    .footer-brand { display: flex; align-items: center; gap: 0.6rem; }
    .footer-logo { width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,0.30); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
    .footer-brand-text .top  { font-size: 0.5rem; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 0.06em; text-transform: uppercase; }
    .footer-brand-text .name { font-size: 0.68rem; font-weight: 800; color: #fff; }
    .footer-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.28); }
    .footer-security { display: flex; align-items: center; gap: 0.5rem; }
    .footer-security svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.85); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .footer-security-text .title { font-size: 0.72rem; font-weight: 800; color: #fff; }
    .footer-security-text .desc  { font-size: 0.62rem; color: rgba(255,255,255,0.65); font-weight: 500; }
    .footer-copy { font-size: 0.65rem; color: rgba(255,255,255,0.55); font-weight: 500; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      top: 1.5rem; right: 1.75rem;
      display: flex; align-items: center; gap: 0.85rem;
      background: #fff;
      border-radius: 16px;
      padding: 1rem 1.25rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f5;
      z-index: 9999;
      min-width: 300px; max-width: 380px;
      transform: translateX(calc(100% + 2rem));
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }
    .toast-icon {
      width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .toast-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .toast.toast-success .toast-icon { background: #f0fdf4; }
    .toast.toast-success .toast-icon svg { stroke: #16a34a; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 0.88rem; font-weight: 800; color: #111827; margin-bottom: 0.15rem; }
    .toast-desc  { font-size: 0.78rem; font-weight: 500; color: #6b7280; }
    .toast-progress {
      position: absolute; bottom: 0; left: 0;
      height: 3px; border-radius: 0 0 16px 16px;
      background: linear-gradient(90deg, #6c63e8, #4a3fc0);
      width: 100%;
      transform-origin: left;
      animation: toast-shrink 2.2s linear forwards;
    }
    @keyframes toast-shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    @media (max-width: 520px) {
      .form-box { padding: 2rem 1.5rem; }
      .footer-bar { flex-wrap: wrap; gap: 0.75rem; padding: 0.75rem 1rem; }
      .footer-copy { display: none; }
      .toast { top: 1rem; right: 1rem; left: 1rem; min-width: unset; }
    }
  </style>
</head>

<body>
  <div class="dot-grid"></div>

  <!-- Form box -->
  <div class="form-box">

    <a href="../index.html" class="back-link">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Kembali
    </a>

    <h1 class="form-title">Masuk sebagai Admin</h1>
    <p class="form-subtitle">Gunakan akun admin yang sudah diaktifkan.</p>

    <div id="alert-box" class="alert d-none"></div>

    <!-- Username -->
    <div class="form-group">
      <label class="form-label">Username <span class="required">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username admin" autocomplete="username"/>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password <span class="required">*</span></label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="password" class="form-control has-toggle" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Toggle password">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      Masuk ke Dashboard
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>

    <div class="divider">atau</div>

    <!-- Register -->
    <button class="btn-register" onclick="window.location.href='register-admin.html'">
      Daftar Admin Baru
    </button>

    <!-- Info note -->
    <div class="info-note">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Admin baru perlu diaktifkan oleh admin yang sudah aktif.</span>
    </div>

  </div>

  <!-- Toast notification -->
  <div class="toast toast-success" id="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="toast-body">
      <div class="toast-title" id="toast-title">Berhasil masuk!</div>
      <div class="toast-desc"  id="toast-desc">Mengalihkan ke dashboard...</div>
    </div>
    <div class="toast-progress"></div>
  </div>

  <!-- Footer bar -->
  <div class="footer-bar">
    <div class="footer-brand">
      <div class="footer-logo">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="30" cy="16" rx="7" ry="7" fill="#c4b5fd"/>
          <path d="M15 44 Q20 30 30 30 Q40 30 45 44" fill="#c4b5fd"/>
        </svg>
      </div>
      <div class="footer-brand-text">
        <div class="top">RSIA</div>
        <div class="name">AL HASANAH MADIUN</div>
      </div>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-security">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div class="footer-security-text">
        <div class="title">Sistem Internal &amp; Akses Terbatas</div>
      </div>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-copy">© 2025 SmartERM v1.0.0 • Internal Use Only</div>
  </div>

  <script type="module">
    import { login } from "../js/api.js";
    import { saveSession } from "../js/auth.js";

    if (localStorage.getItem("role") === "admin") {
      window.location.href = "dashboard-admin.html";
    }

    function showToast(title, desc) {
      const toast = document.getElementById("toast");
      document.getElementById("toast-title").textContent = title;
      document.getElementById("toast-desc").textContent  = desc;
      // reset progress bar animation
      const prog = toast.querySelector(".toast-progress");
      prog.style.animation = "none";
      prog.offsetHeight; // reflow
      prog.style.animation = "";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    window.togglePassword = function() {
      const input = document.getElementById("password");
      const icon  = document.getElementById("eye-icon");
      if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      } else {
        input.type = "password";
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      }
    };

    window.doLogin = async function() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("btn-login");
      const alertBox = document.getElementById("alert-box");

      if (!username || !password) {
        alertBox.className = "alert";
        alertBox.innerHTML = "⚠️ Username dan password wajib diisi.";
        alertBox.classList.remove("d-none");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Memproses...`;
      alertBox.classList.add("d-none");

      try {
        const data = await login(username, password);

        if (data.role !== "admin") {
          throw new Error("Akun ini bukan admin. Gunakan halaman login dokter.");
        }

        saveSession(data);
        showToast(`Selamat datang, ${data.nama_lengkap}!`, "Mengalihkan ke dashboard admin...");

        setTimeout(() => window.location.href = "dashboard-admin.html", 800);

      } catch (err) {
        alertBox.className = "alert";
        alertBox.innerHTML = `❌ ${err.message}`;
        alertBox.classList.remove("d-none");
        btn.disabled = false;
        btn.innerHTML = `Masuk ke Dashboard <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
      }
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") window.doLogin();
    });
  </script>
</body>
</html>
