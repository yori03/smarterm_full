<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekam Medis — SmartERM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Times New Roman', Times, serif;
      background: #c8c8c8;
      color: #111;
      font-size: 12px;
      line-height: 1.45;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ─── Print bar ─────────────────────── */
    .print-bar {
      background: #1a3a5c;
      padding: 0.65rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .print-bar p   { color: rgba(255,255,255,0.8); font-size: 0.84rem; font-family: Arial,sans-serif; }
    .print-bar .btns { display: flex; gap: 0.55rem; }
    .print-bar button {
      padding: 0.42rem 1rem;
      border-radius: 6px;
      font-family: Arial,sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }
    .btn-print { background: #22c55e; color: white; }
    .btn-back  { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3) !important; }

    /* ─── Halaman / kertas ──────────────── */
    .page {
      width: 740px;
      min-height: 1050px;
      margin: 1.2rem auto 2.5rem;
      background: white;
      padding: 20px 34px 24px;
      box-shadow: 0 4px 22px rgba(0,0,0,0.28);
    }

    /* ─── KOP SURAT ─────────────────────── */
    .kop {
      display: grid;
      grid-template-columns: 70px 1fr 70px;
      align-items: center;
      gap: 8px;
      padding-bottom: 5px;
      border-bottom: 3px solid #000;
    }
    .kop-logo {
      width: 68px; height: 68px;
      display: flex; align-items: center; justify-content: center;
    }
    .kop-logo img { width: 100%; height: 100%; object-fit: contain; }
    .kop-logo .placeholder {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 7.5px; text-align: center; line-height: 1.3; font-weight: bold;
    }

    .kop-center { text-align: center; line-height: 1.3; }
    .kop-center .rs-top    { font-size: 11.5px; }
    .kop-center .rs-bold   { font-size: 15.5px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; }
    .kop-center .rs-addr   { font-size: 10.5px; margin-top: 2px; }
    .kop-center .rs-city   { font-size: 13px; font-weight: 900; text-transform: uppercase; margin-top: 1px; }

    /* ─── Label Data Rahasia ─────────────── */
    .data-rahasia {
      text-align: right;
      font-size: 11px;
      font-style: italic;
      margin: 3px 0 5px;
    }

    /* ─── Judul dokumen ──────────────────── */
    .doc-title {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;   /* was 14px */
    }

    /* ─── Seksi ──────────────────────────── */
    .section { margin-bottom: 7px; }  /* was 13px */
    .section-title {
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 3px;   /* was 5px */
    }

    /*
    ╔══════════════════════════════════════════════════════╗
    ║  TABEL — 2 kolom saja (label | nilai)               ║
    ║  • table-layout: fixed  → lebar konsisten           ║
    ║  • Kolom label = 200px untuk SEMUA tabel            ║
    ║  • Tidak ada kolom colon terpisah                   ║
    ║  • Nilai diawali ": " langsung di dalam sel         ║
    ╚══════════════════════════════════════════════════════╝
    */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
      table-layout: fixed;
    }

    .data-table td {
      border: 1px solid #000;
      padding: 3px 8px;     /* was 5px 10px */
      vertical-align: middle;
    }

    /* Kolom label — FIXED 200px, sama untuk semua tabel */
    .data-table td.lbl {
      width: 200px;
    }

    /* Kolom nilai */
    .data-table td.val {
      /* sisa lebar otomatis */
    }


    /* Row yang butuh tinggi lebih (multi-baris) */
    .data-table tr.tall td {
      height: 30px;         /* was 38px */
      vertical-align: top;
      padding-top: 4px;     /* was 6px */
    }

    /* ─── Footer / TTD ───────────────────── */
    .surat-footer {
      margin-top: 14px;     /* was 30px */
      display: flex;
      justify-content: flex-end;
    }
    .ttd-area { text-align: center; min-width: 200px; }
    .ttd-place { font-size: 11.5px; }
    .ttd-role  { font-size: 11.5px; margin-bottom: 36px; } /* was 50px */
    .ttd-line  { border-top: 1px solid #000; width: 170px; margin: 0 auto 3px; }
    .ttd-name  { font-size: 11.5px; font-weight: 700; }

    /* ─── Footer note ────────────────────── */
    .footer-note {
      margin-top: 10px;     /* was 18px */
      text-align: center;
      font-size: 9.5px;
      color: #555;
      border-top: 1px solid #bbb;
      padding-top: 5px;     /* was 7px */
    }

    /* ─── Loading ────────────────────────── */
    .loading-state {
      text-align: center;
      padding: 4rem;
      color: #666;
      font-family: Arial, sans-serif;
    }

    /* ─── Print CSS ──────────────────────── */
    @media print {
      body { background: white; }
      .print-bar { display: none !important; }
      .page { margin: 0; padding: 18px 26px 22px; box-shadow: none; width: 100%; min-height: auto; }
    }
  </style>
</head>
<body>

  <!-- Print bar -->
  <div class="print-bar" id="print-bar">
    <p id="doc-status">Memuat rekam medis...</p>
    <div class="btns">
      <button class="btn-back" onclick="history.back()">← Kembali</button>
      <button class="btn-print" onclick="window.print()" id="btn-print" disabled>🖨️ Cetak / Unduh PDF</button>
    </div>
  </div>

  <!-- Halaman surat -->
  <div class="page" id="page">
    <div class="loading-state" id="loading-state">Memuat data rekam medis...</div>
  </div>

  <script type="module">
    import { getRekamMedis } from "../js/api.js";

    if (!localStorage.getItem("access_token")) {
      window.location.href = "../index.html";
    }

    const params   = new URLSearchParams(window.location.search);
    const idRecord = params.get("id");

    if (!idRecord) {
      document.getElementById("loading-state").innerHTML = "❌ ID Rekam Medis tidak ditemukan.";
    } else {
      loadAndRender(idRecord);
    }

    async function loadAndRender(id) {
      try {
        const data = await getRekamMedis(id);
        renderSurat(data);
        document.getElementById("doc-status").textContent =
          `Rekam Medis — ${data.pasien || "-"} • ${fmtDate(data.waktu_pemeriksaan)}`;
        document.getElementById("btn-print").disabled = false;
      } catch (err) {
        document.getElementById("loading-state").innerHTML = `❌ Gagal memuat: ${err.message}`;
      }
    }

    function renderSurat(data) {
      const dm = data.data_medis || {};
      document.getElementById("page").innerHTML = buildHTML(data, dm);
    }

    /* ─── Helper: buat baris tabel 2 kolom ─── */
    function row(label, value, tall = false) {
      const cls = tall ? ' class="tall"' : '';
      return `<tr${cls}><td class="lbl">${label}</td><td class="val">${value || ''}</td></tr>`;
    }

    function buildHTML(data, dm) {
      const noRm   = data.no_rekam_medis || "-";
      const pasien = data.pasien  || "-";
      const dokter = data.dokter  || "-";
      const tglDt  = fmtDateTime(data.waktu_pemeriksaan);

      return `
      <!-- ═══ KOP SURAT ═══ -->
      <div class="kop">
        <div class="kop-logo">
          <img src="logoalhasanah.png" alt="Logo RSIA"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',textContent:'RSIA AL HASANAH'}))">
        </div>

        <div class="kop-center">
          <div class="rs-top">RUMAH SAKIT IBU DAN ANAK</div>
          <div class="rs-bold">AL-HASANAH</div>
          <div class="rs-addr">Jalan Sri Rejeki No.91 B Telp (0351) 463173, 7705075 Fax (0351) 467733</div>
          <div class="rs-city">KOTA MADIUN</div>
        </div>

        <div class="kop-logo">
          <img src="logo yayasan hijau.png" alt="Logo Yayasan"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',textContent:'YAYASAN AL HASANAH MADIUN'}))">
        </div>
      </div>

      <!-- Data Rahasia -->
      <div class="data-rahasia">Data Rahasia</div>

      <!-- Judul -->
      <div class="doc-title">PENGKAJIAN MEDIS RAWAT JALAN PASIEN GINEKOLOGI</div>

      <!-- ═══ I. DATA PASIEN ═══ -->
      <div class="section">
        <div class="section-title">I. DATA PASIEN</div>
        <table class="data-table">
          ${row('Nama Pasien',      pasien)}
          ${row('Tgl. Lahir',       dm.tanggal_lahir ? fmtDate(dm.tanggal_lahir) : '')}
          ${row('Alamat',           dm.alamat)}
          ${row('No. Rekam Medis',  noRm)}
          ${row('Dokter Pemeriksa', dokter)}
          ${row('Waktu Pemeriksaan', tglDt)}
        </table>
      </div>

      <!-- ═══ II. TANDA-TANDA VITAL ═══ -->
      <div class="section">
        <div class="section-title">II. TANDA-TANDA VITAL</div>
        <table class="data-table">
          ${row('Tekanan Darah', dm.tekanan_darah)}
          ${row('Nadi',          dm.nadi)}
          ${row('Suhu',          dm.suhu)}
        </table>
      </div>

      <!-- ═══ III. ANAMNESIS ═══ -->
      <div class="section">
        <div class="section-title">III. ANAMNESIS</div>
        <table class="data-table">
          ${row('Keluhan Utama',               dm.keluhan_utama,               true)}
          ${row('Riwayat Penyakit Sekarang',   dm.riwayat_penyakit_sekarang,   true)}
          ${row('Riwayat Penyakit Keluarga',   dm.riwayat_penyakit_keluarga,   true)}
        </table>
      </div>

      <!-- ═══ IV. DATA KEBIDANAN ═══ -->
      <div class="section">
        <div class="section-title">IV. DATA KEBIDANAN</div>
        <table class="data-table">
          ${row('HPHT', dm.hpht ? fmtDate(dm.hpht) : '')}
        </table>
      </div>

      <!-- ═══ V. PEMERIKSAAN FISIK ═══ -->
      <div class="section">
        <div class="section-title">V. PEMERIKSAAN FISIK</div>
        <table class="data-table">
          ${row('Pemeriksaan Fisik', dm.pemeriksaan_fisik_lengkap, true)}
        </table>
      </div>

      <!-- ═══ VI. DIAGNOSIS & TATALAKSANA ═══ -->
      <div class="section">
        <div class="section-title">VI. DIAGNOSIS &amp; TATALAKSANA</div>
        <table class="data-table">
          ${row('Diagnosa Utama',  dm.diagnosa_utama,  true)}
          ${row('Rencana Layanan', dm.rencana_layanan, true)}
          ${row('Resep Obat',      dm.resep_obat,      true)}
          ${row('Edukasi Pasien',  dm.edukasi_pasien,  true)}
        </table>
      </div>

      <!-- ═══ TANDA TANGAN ═══ -->
      <div class="surat-footer">
        <div class="ttd-area">
          <div class="ttd-place">Madiun,&nbsp;(Tanggal Periksa)</div>
          <div class="ttd-role">Dokter Pemeriksa</div>
          <div class="ttd-line"></div>
          <div class="ttd-name">(${dokter})</div>
        </div>
      </div>

      <!-- ═══ FOOTER NOTE ═══ -->
      <div class="footer-note">
        Dokumen ini bersifat rahasia memuat data kondisi medis pasien RSIA AL-Hasanah.<br>
        Dicetak dan cetak oleh SmartERM
      </div>
      `;
    }

    function fmtDate(d) {
      if (!d) return "";
      try { return new Date(d).toLocaleDateString("id-ID", { day:"numeric", month:"long", year:"numeric" }); }
      catch { return d; }
    }
    function fmtDateTime(d) {
      if (!d) return "-";
      try { return new Date(d).toLocaleString("id-ID", { day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" }); }
      catch { return d; }
    }
  </script>

</body>
</html>
